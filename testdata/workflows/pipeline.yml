# A multi-job pipeline for exercising job selection and isolated-run needs:
#
#   actl testdata/workflows/pipeline.yml
#       -> lists jobs (build, deploy, test) and asks for -job
#
#   actl -job build testdata/workflows/pipeline.yml
#       -> build runs for real and produces its own outputs
#
#   actl -job deploy testdata/workflows/pipeline.yml
#       -> deploy in isolation: needs.build/test are faked (result=success
#          assumed, outputs empty). The transparency line shows exactly that.
#
#   actl -job deploy \
#        -need 'build.outputs.image=ghcr.io/acme/app:1.4.2' \
#        -need 'build.outputs.version=1.4.2' \
#        testdata/workflows/pipeline.yml
#       -> deploy with the upstream outputs baked in; re-run the same command
#          and the values are already there.
#
#   actl -job deploy -need 'build.result=failure' testdata/workflows/pipeline.yml
#       -> the job-level `if` gate fails, so deploy is skipped — shows why the
#          result defaults to success.
name: pipeline
on: push

env:
  REGISTRY: ghcr.io/acme

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: checkout
        run: echo "pretend we cloned the repo"
      - name: compute metadata
        id: meta
        run: |
          echo "version=1.4.2" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY/app:1.4.2" >> "$GITHUB_OUTPUT"
      - name: build image
        run: echo "building ${{ steps.meta.outputs.image }}"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: unit tests
        run: echo "running unit tests"
      - name: lint
        run: echo "running linters"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: needs.build.result == 'success'
    steps:
      - name: guard
        run: |
          echo "build result: ${{ needs.build.result }}"
          echo "tests result: ${{ needs.test.result }}"
      - name: pull image
        run: echo "pulling '${{ needs.build.outputs.image }}' (version '${{ needs.build.outputs.version }}')"
      - name: deploy
        run: |
          IMG='${{ needs.build.outputs.image }}'
          if [ -z "$IMG" ]; then
            echo "no image provided — seed it with: -need 'build.outputs.image=...'"
          else
            echo "deploying $IMG to $REGISTRY"
          fi
