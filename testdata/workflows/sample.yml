name: sample
on: push

env:
  GREETING: hello

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GREETING: hello
    steps:
      - name: greet
        run: echo "$GREETING from step one"
      - name: set stage
        run: echo "STAGE=build" >> "$GITHUB_ENV"
      - name: show stage
        run: echo "stage is now '$STAGE'"
      - name: compute version
        run: echo "VERSION=1.2.3" >> "$GITHUB_ENV"
      - run: echo "step with no name"
      - name: build
        run: echo "building $VERSION at stage $STAGE"
      - name: linger
        run: |
          echo "a step worth pausing on -- set a breakpoint here"
          echo "done"
