name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload archives

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with the act submodule)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history for the changelog
          submodules: recursive # third_party/act — the go.mod replace target

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Built-in token: creates the release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo PAT: lets GoReleaser push the formula to ruzmuh/homebrew-actl.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
